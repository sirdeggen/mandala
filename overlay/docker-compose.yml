services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
  overlay:
    build: .
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongodb:27017/mandala
    ports: ["8080:8080"]
    volumes: ["overlay-data:/data"]
    depends_on: ["mongodb"]
volumes:
  mongo-data:
  overlay-data:
